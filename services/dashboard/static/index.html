```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudTrap — Threat Monitor</title>

  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --bg:#020408;
      --surface:#080f18;
      --border:#0d2137;
      --accent:#00d4ff;
      --red:#ff3b57;
      --yellow:#f5c400;
      --green:#00e676;
      --muted:#3a5570;
      --text:#c8dff0;
    }

    * {
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body {
      background:var(--bg);
      color:var(--text);
      font-family:'Syne',sans-serif;
      padding:24px;
    }

    .container {
      max-width:1400px;
      margin:auto;
    }

    header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:24px;
    }

    .logo {
      font-size:32px;
      font-weight:800;
      color:white;
    }

    .logo span {
      color:var(--accent);
    }

    .stats-row {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      margin-bottom:24px;
    }

    .stat-card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:12px;
      padding:20px;
    }

    .stat-label {
      color:var(--muted);
      font-size:12px;
      margin-bottom:8px;
    }

    .stat-value {
      font-size:36px;
      font-weight:800;
    }

    .main-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-bottom:16px;
    }

    .panel {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:12px;
      padding:20px;
      margin-bottom:16px;
    }

    .panel-title {
      color:var(--accent);
      margin-bottom:16px;
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .chart-wrap {
      height:300px;
    }

    .map-wrap {
      height:500px;
      width:100%;
      border-radius:12px;
      overflow:hidden;
      border:1px solid var(--border);
    }

    #attack-map {
      height:100%;
      width:100%;
    }

    table {
      width:100%;
      border-collapse:collapse;
      margin-top:12px;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid var(--border);
      text-align:left;
      font-size:13px;
    }

    th {
      color:var(--muted);
    }

    .sev-badge {
      padding:4px 8px;
      border-radius:6px;
      font-size:11px;
      font-weight:bold;
    }

    .sev-CRITICAL {
      background:#ff3b5733;
      color:#ff3b57;
    }

    .sev-HIGH {
      background:#f5c40033;
      color:#f5c400;
    }

    .sev-MEDIUM {
      background:#00d4ff33;
      color:#00d4ff;
    }

    .sev-LOW {
      background:#00e67633;
      color:#00e676;
    }
  </style>
</head>

<body>

<div class="container">

<header>
  <div class="logo">Cloud<span>Trap</span></div>
  <div id="refresh-time">Loading...</div>
</header>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">Critical Events</div>
    <div class="stat-value" id="cnt-critical">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">High Severity</div>
    <div class="stat-value" id="cnt-high">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Total Events</div>
    <div class="stat-value" id="cnt-total">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-label">Attackers</div>
    <div class="stat-value" id="cnt-attackers">0</div>
  </div>
</div>

<div class="main-grid">

  <div class="panel">
    <div class="panel-title">Attack Types</div>
    <div class="chart-wrap">
      <canvas id="attackChart"></canvas>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Severity Breakdown</div>
    <div class="chart-wrap">
      <canvas id="severityChart"></canvas>
    </div>
  </div>

</div>

<div class="panel">
  <div class="panel-title">World Attack Map</div>

  <div class="map-wrap">
    <div id="attack-map"></div>
  </div>
</div>

<div class="panel">
  <div class="panel-title">Top Attackers</div>

  <div id="attacker-table-wrap"></div>
</div>

</div>

<script>

let attackChart;
let severityChart;
let attackMap;
let attackMarkers = [];

async function fetchReport() {
  const res = await fetch('/api/report');
  return await res.json();
}

function initCharts() {

  attackChart = new Chart(
    document.getElementById('attackChart'),
    {
      type:'bar',
      data:{
        labels:[],
        datasets:[{
          data:[],
          backgroundColor:'#00d4ff55',
          borderColor:'#00d4ff',
          borderWidth:1
        }]
      }
    }
  );

  severityChart = new Chart(
    document.getElementById('severityChart'),
    {
      type:'doughnut',
      data:{
        labels:['CRITICAL','HIGH','MEDIUM','LOW'],
        datasets:[{
          data:[0,0,0,0],
          backgroundColor:[
            '#ff3b57',
            '#f5c400',
            '#00d4ff',
            '#00e676'
          ]
        }]
      }
    }
  );
}

function initMap() {

  attackMap = L.map('attack-map').setView([20,0],2);

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
      attribution:'&copy; OpenStreetMap contributors'
    }
  ).addTo(attackMap);
}

async function updateAttackMap() {

  const res = await fetch('/api/attack-map');

  const attacks = await res.json();

  attackMarkers.forEach(marker => attackMap.removeLayer(marker));

  attackMarkers = [];

  attacks.forEach(attack => {

    if (!attack.latitude || !attack.longitude) return;

    const color =
      attack.severity === 'CRITICAL' ? '#ff3b57' :
      attack.severity === 'HIGH' ? '#f5c400' :
      attack.severity === 'MEDIUM' ? '#00d4ff' :
      '#00e676';

    const marker = L.circleMarker(
      [attack.latitude, attack.longitude],
      {
        radius:8,
        color:color,
        fillColor:color,
        fillOpacity:0.75,
        weight:2
      }
    ).addTo(attackMap);

    marker.bindPopup(`
      <b>${attack.source_ip}</b><br>
      ${attack.city}, ${attack.country}<br>
      ISP: ${attack.isp}<br>
      Attack: ${attack.attack_type}<br>
      Severity: ${attack.severity}<br>
      Events: ${attack.event_count}
    `);

    attackMarkers.push(marker);
  });
}

function renderTable(attackers) {

  if (!attackers || attackers.length === 0) {
    document.getElementById('attacker-table-wrap').innerHTML =
      '<p>No attackers yet.</p>';
    return;
  }

  const rows = attackers.map(a => `
    <tr>
      <td>${a.ip}</td>
      <td><span class="sev-badge sev-${a.top_severity}">${a.top_severity}</span></td>
      <td>${a.threat_score}</td>
      <td>${a.event_count}</td>
    </tr>
  `).join('');

  document.getElementById('attacker-table-wrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>IP</th>
          <th>Severity</th>
          <th>Threat Score</th>
          <th>Events</th>
        </tr>
      </thead>

      <tbody>
        ${rows}
      </tbody>
    </table>
  `;
}

async function refresh() {

  const report = await fetchReport();

  document.getElementById('cnt-critical').textContent =
    report.severity_counts.CRITICAL || 0;

  document.getElementById('cnt-high').textContent =
    report.severity_counts.HIGH || 0;

  document.getElementById('cnt-total').textContent =
    report.total_events || 0;

  document.getElementById('cnt-attackers').textContent =
    (report.attackers || []).length;

  document.getElementById('refresh-time').textContent =
    'Updated: ' + new Date().toLocaleTimeString();

  const summary = report.attack_summary || {};

  attackChart.data.labels = Object.keys(summary);

  attackChart.data.datasets[0].data = Object.values(summary);

  attackChart.update();

  severityChart.data.datasets[0].data = [
    report.severity_counts.CRITICAL || 0,
    report.severity_counts.HIGH || 0,
    report.severity_counts.MEDIUM || 0,
    report.severity_counts.LOW || 0
  ];

  severityChart.update();

  renderTable(report.attackers || []);

  await updateAttackMap();
}

initCharts();
initMap();

refresh();

setInterval(refresh, 60000);

</script>

</body>
</html>
